name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-packages-${{ runner.os }}

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck -x --source-path=SCRIPTDIR \
            bin/gravatar-avatar-sync \
            install.sh \
            uninstall.sh \
            lib/gravatar-avatar-sync/display.sh \
            lib/gravatar-avatar-sync/identity.sh \
            lib/gravatar-avatar-sync/fetch.sh \
            lib/gravatar-avatar-sync/update.sh \
            lib/gravatar-avatar-sync/providers/gravatar.sh

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: bash tests/unit.sh

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-packages-${{ runner.os }}

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Run integration tests
        run: bash tests/integration.sh
