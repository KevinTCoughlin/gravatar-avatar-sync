name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build source archive
        run: |
          git archive \
            --format=tar.gz \
            --prefix="gravatar-avatar-sync-${{ steps.version.outputs.VERSION }}/" \
            -o "gravatar-avatar-sync-${{ steps.version.outputs.VERSION }}.tar.gz" \
            "$GITHUB_REF_NAME"

      - name: Extract changelog for this release
        id: changelog
        run: |
          version="${{ steps.version.outputs.VERSION }}"
          # Extract the section between this version header and the next header
          notes="$(awk "/^## \[${version}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)"
          {
            echo "NOTES<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: ${{ steps.changelog.outputs.NOTES }}
          files: "gravatar-avatar-sync-${{ steps.version.outputs.VERSION }}.tar.gz"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
