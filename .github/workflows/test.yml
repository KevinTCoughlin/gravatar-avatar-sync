name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  bats:
    name: bats unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: sudo apt-get install -y bats

      - name: Run tests
        run: bats tests/
